# HTTPS smoke: same managed TLS path as cluster.yaml; mock OpenAI /v1/models on loopback 18000.
# Run: uv run python scripts/smoke_e2e_proxy.py --spec examples/cluster_smoke_e2e_https.yaml

name: nova-smoke-proxy-https
num_nodes: 1
reconcile_interval_seconds: 60

resources:
  image: runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel
  gpu: RTX3090
  gpu_count: 1
  ports:
    - 8888
    - 8000
  log_server_port: 8888
  worker_api_port: 8000
  worker_https: true
  worker_tls_verify: false
  managed_worker_tls: true
  cloud_type: ALL
  zones:
    - US-IL-1
    - US-TX-1
    - US-CA-1
    - US-DE-1
    - US-WA-1
  container_disk_in_gb: 25

envs: {}

setup: |
  nvidia-smi || true

run: |
  python3 -u <<'QPMOCK'
  import json
  import pathlib
  import socket
  import socketserver
  import http.server

  def wid():
      try:
          return pathlib.Path("/etc/hostname").read_text().strip()
      except OSError:
          return socket.gethostname()

  class H(http.server.BaseHTTPRequestHandler):
      def log_message(self, *_args):
          return

      def do_GET(self):
          p = self.path.split("?", 1)[0].rstrip("/")
          if p != "/v1/models":
              self.send_response(404)
              self.end_headers()
              return
          payload = {
              "object": "list",
              "data": [{"id": wid(), "object": "model", "owned_by": "quickpod-smoke-https"}],
          }
          b = json.dumps(payload).encode()
          self.send_response(200)
          self.send_header("Content-Type", "application/json")
          self.end_headers()
          self.wfile.write(b)

  socketserver.TCPServer.allow_reuse_address = True
  with socketserver.ThreadingTCPServer(("127.0.0.1", 18000), H) as httpd:
      httpd.serve_forever()
  QPMOCK
