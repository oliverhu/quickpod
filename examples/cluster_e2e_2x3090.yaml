# E2E: 2× RTX 3090 — reconcile should refill after one pod is terminated.
# quickpod injects /quickpod/logs + /quickpod/system; this run only serves /v1/models on worker_api_port.

name: nova-e2e-2x-3090
num_nodes: 2
reconcile_interval_seconds: 30

resources:
  image: runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel
  gpu: RTX3090
  gpu_count: 1
  ports:
    - 8000
  worker_api_port: 8000
  cloud_type: ALL
  zones:
    - US-IL-1
    - US-TX-1
    - US-CA-1
    - US-DE-1
    - US-WA-1
  container_disk_in_gb: 20

envs: {}

setup: |
  set -euo pipefail
  mkdir -p /workspace
  exec > >(tee -a /workspace/replica.log) 2>&1
  nvidia-smi || true
  echo "quickpod e2e setup finished"

run: |
  python3 -u <<'QPMOCK'
  import json
  import pathlib
  import socket
  import socketserver
  import http.server

  def _wid():
      try:
          return pathlib.Path("/etc/hostname").read_text().strip()
      except OSError:
          return socket.gethostname()

  class H(http.server.BaseHTTPRequestHandler):
      def log_message(self, *_args):
          return

      def do_GET(self):
          p = self.path.split("?", 1)[0].rstrip("/")
          if p != "/v1/models":
              self.send_response(404)
              self.end_headers()
              return
          payload = {
              "object": "list",
              "data": [{"id": _wid(), "object": "model", "owned_by": "quickpod-e2e-2x3090"}],
          }
          self.send_response(200)
          self.send_header("Content-Type", "application/json")
          self.end_headers()
          self.wfile.write(json.dumps(payload).encode())

  socketserver.TCPServer.allow_reuse_address = True
  with socketserver.ThreadingTCPServer(("0.0.0.0", 8000), H) as httpd:
      httpd.serve_forever()
  QPMOCK
