# Minimal RunPod cluster with mTLS: quickpod injects Caddy + /quickpod/logs + /quickpod/system when secure_mode is true.
# Generate certs once: scripts/gen_mtls_certs.sh examples/mtls_smoke_certs
# Your API must listen on 127.0.0.1:18000 (see quickpod.managed_worker.loopback_api_port).

name: nova-vllm
num_nodes: 1
reconcile_interval_seconds: 60

resources:
  image: runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel
  gpu: RTX4090
  gpu_count: 1
  ports:
    - 8000
  worker_api_port: 8000
  secure_mode: true
  cloud_type: SECURE
  zones:
    - US-IL-1
  container_disk_in_gb: 50
  mtls:
    verify_server_hostname: false
    ca_file: mtls_smoke_certs/ca.pem
    client_cert_file: mtls_smoke_certs/client.crt
    client_key_file: mtls_smoke_certs/client.key
    server_cert_file: mtls_smoke_certs/server.pem
    server_key_file: mtls_smoke_certs/server.key

envs:
  HF_MODEL_ID: google/gemma-4-E4B-it

setup: |
  pip install --upgrade pip
  pip install "vllm>=0.8.0"
  pip install --upgrade "transformers>=5.5.0"
  pip install hf_transfer

run: |
  export HF_HOME="${HF_HOME:-$HOME/.cache/huggingface}"
  exec python -m vllm.entrypoints.openai.api_server \
    --model "${HF_MODEL_ID}" \
    --host 127.0.0.1 \
    --port 18000 \
    --dtype auto
